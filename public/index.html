<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="styles/global.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="description" content="Web site created using create-react-app" />
    <title>Spotalyze</title>
</head>

<body>
    <div id="root">
        <div>
            <button id="login" type="button">Authenticate</button>
            <input id="textInput" type="text" placeholder="Spotify Playlist URL">
            <button id="getReleaseDates" type="button">Check release dates</button>
            <button id="playlistToCSV" type="button">Playlist to CSV</button>
            <button id="createShuffled" type="button">Shuffle</button>
        </div>
    </div>
    <script type="module">
        const playlistId = () => document.getElementById("textInput").value.split("/").pop().split("?").shift();
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("login").addEventListener("click", (e) => window.location.href = `/login`);
            document.getElementById("getReleaseDates").addEventListener("click", (e) => window.location.href = `/getReleaseDates/?id=${playlistId()}`);
            document.getElementById("playlistToCSV").addEventListener("click", (e) => window.location.href = `/playlistToCSV/?id=${playlistId()}`);
            document.getElementById("createShuffled").addEventListener("click", (e) => window.location.href = `/createShuffled/?id=${playlistId()}`);
        });
    </script>
</body>

</html>
